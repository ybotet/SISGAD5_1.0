version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    container_name: sisgad5-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sisgad5
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sisgad5-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-users:
    build: ./backend-users
    container_name: sisgad5-users
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${USERS_DB_NAME}
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sisgad5-network

  backend-mp:
    build: ./backend-mp
    container_name: sisgad5-mp
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5002
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${MP_DB_NAME}
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - USERS_SERVICE_URL=http://backend-users:5001
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sisgad5-network

  api-gateway:
    build: ./api-gateway
    container_name: sisgad5-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000" # Solo localhost (nginx)
    environment:
      - NODE_ENV=production
      - PORT=5000
      - USERS_SERVICE_URL=http://backend-users:5001
      - MP_SERVICE_URL=http://backend-mp:5002
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - backend-users
      - backend-mp
    networks:
      - sisgad5-network

volumes:
  postgres_data:

networks:
  sisgad5-network:
    driver: bridge
