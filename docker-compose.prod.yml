version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    container_name: sisgad5-postgres
    environment:
      POSTGRES_DB: sisgad5
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backup:/docker-entrypoint-initdb.d
    networks:
      - sisgad5-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-users:
    build: ./backend-users
    container_name: sisgad5-users
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=development
      - PORT=5001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${USERS_DB_NAME}
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
    volumes:
      - ./backend-users:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sisgad5-network

  backend-mp:
    build: ./backend-mp
    container_name: sisgad5-mp
    ports:
      - "5002:5002"
    environment:
      - NODE_ENV=development
      - PORT=5002
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${MP_DB_NAME}
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - USERS_SERVICE_URL=http://backend-users:5001
      - FRONTEND_URL=${FRONTEND_URL}
    volumes:
      - ./backend-mp:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sisgad5-network

  api-gateway:
    build: ./api-gateway
    container_name: sisgad5-gateway
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - USERS_SERVICE_URL=http://backend-users:5001
      - MP_SERVICE_URL=http://backend-mp:5002
      - FRONTEND_URL=${FRONTEND_URL}
    volumes:
      - ./api-gateway:/app
      - /app/node_modules
    depends_on:
      - backend-users
      - backend-mp
    networks:
      - sisgad5-network

  frontend:
    build: ./frontend
    container_name: sisgad5-frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:5000/api
      - VITE_FRONT_URL=http://localhost:5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api-gateway
    networks:
      - sisgad5-network

volumes:
  postgres_data:

networks:
  sisgad5-network:
    driver: bridge
