version: "3.8"

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: sisgad5
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sisgad5-network

  # Microservicio de Usuarios
  backend-users:
    build: ./backend-users
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=development
      - PORT=5001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bd_sisgad5_users
      - DB_USER=postgres
      - DB_PASSWORD=password
      - JWT_SECRET=tu_jwt_secret_aqui
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - postgres
    networks:
      - sisgad5-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Microservicio de mp
  backend-mp:
    build: ./backend-mp
    ports:
      - "5002:5002"
    environment:
      - NODE_ENV=development
      - PORT=5002
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bd_sisgad5_mp
      - DB_USER=postgres
      - DB_PASSWORD=password
      - JWT_SECRET=tu_jwt_secret_aqui
      - USERS_SERVICE_URL=http://backend-users:5001
      - FRONTEND_URL=http://localhost:5173
      - JWT_SECRET=tu_jwt_secret_aqui
    depends_on:
      - postgres
    networks:
      - sisgad5-network

  # API Gateway
  api-gateway:
    build: ./api-gateway
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - USERS_SERVICE_URL=http://backend-users:5001
      - MP_SERVICE_URL=http://backend-mp:5002
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - backend-users
      - backend-mp
    networks:
      - sisgad5-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Frontend - 🔥 CORREGIDO: indentación correcta
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:5000/api # 🔥 CAMBIO IMPORTANTE: usa localhost, no api-gateway
      - VITE_BASE_URL=/
      - VITE_FRONT_URL=http://localhost:5173
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api-gateway
    networks:
      - sisgad5-network

volumes:
  postgres_data:

networks:
  sisgad5-network:
    driver: bridge
