version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: sisgad5
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sisgad5-network

  # Microservicio de Usuarios
  backend-users:
    build: ./backend-users
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=development
      - PORT=5001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=sisgad5
      - DB_USER=postgres
      - DB_PASSWORD=password
      - JWT_SECRET=tu_jwt_secret_aqui
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - postgres
    networks:
      - sisgad5-network

  # Microservicio de Servicios
  backend-services:
    build: ./backend-services
    ports:
      - "5002:5002"
    environment:
      - NODE_ENV=development
      - PORT=5002
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=sisgad5
      - DB_USER=postgres
      - DB_PASSWORD=password
      - JWT_SECRET=tu_jwt_secret_aqui
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - postgres
    networks:
      - sisgad5-network

  # API Gateway
  api-gateway:
    build: ./api-gateway
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - USERS_SERVICE_URL=http://backend-users:5001
      - SERVICES_SERVICE_URL=http://backend-mp:5002
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - backend-users
      - backend-services
    networks:
      - sisgad5-network

volumes:
  postgres_data:

networks:
  sisgad5-network:
    driver: bridge